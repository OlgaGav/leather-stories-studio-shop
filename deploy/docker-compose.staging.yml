# /opt/leather-shop/staging/docker-compose.yml

services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_staging:/data/db

  app:
    image: ghcr.io/olgagav/leather-stories-studio-shop:staging
    restart: always
    env_file:
      - ./.env.staging
    depends_on:
      - mongo
    ports:
      - "127.0.0.1:5001:5050"

volumes:
  mongo_staging: