services:
  mongo:
    image: mongo:7
    container_name: leather_mongo_dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: leather_server_dev
    ports:
      - "5050:5050"
    env_file:
      - ./server/.env.dev
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: leather_client_dev
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env.development
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_dev_data: