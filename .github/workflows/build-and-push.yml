name: Build and push Docker images

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push staging (on main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/olgagav/leather-stories-studio-shop:staging
            ghcr.io/olgagav/leather-stories-studio-shop:staging-${{ github.sha }}

      - name: Build & push prod (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/olgagav/leather-stories-studio-shop:prod
            ghcr.io/olgagav/leather-stories-studio-shop:prod-${{ github.sha }}